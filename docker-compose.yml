version: "3.9"

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      FBA_DB_HOST: db
      FBA_DB_NAME: fba
      FBA_DB_USER: fba
      FBA_DB_PASS: fba
      FBA_GAMES_DB_HOST: db
      FBA_GAMES_DB_NAME: games_db
      FBA_GAMES_DB_USER: fba
      FBA_GAMES_DB_PASS: fba
    depends_on:
      - db

  db:
    image: mariadb:11.3
    environment:
      MARIADB_DATABASE: fba
      MARIADB_USER: fba
      MARIADB_PASSWORD: fba
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/init:/docker-entrypoint-initdb.d
      - ./bancos_local_test:/docker-dumps:ro

volumes:
  db_data:
